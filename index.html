<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Signal Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #08090d;
  --s1: #0e1018;
  --s2: #13161f;
  --s3: #1a1e2a;
  --border: #1f2435;
  --border2: #262c3d;
  --long: #00e5a0;
  --long-dim: rgba(0,229,160,0.1);
  --short: #ff4466;
  --short-dim: rgba(255,68,102,0.1);
  --neutral: #f5a623;
  --neutral-dim: rgba(245,166,35,0.1);
  --text: #e2e8f4;
  --muted: #5a6278;
  --muted2: #3d4358;
  --accent: #5b6ef5;
  --accent2: #7c8cf8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 48px; }

/* HEADER */
.header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); background: var(--s1); position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), #9b6ef5); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.logo-text { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 1px; }
.logo-text span { color: var(--accent2); }
.header-right { display: flex; align-items: center; gap: 8px; }
.status-bar { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--long); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
.refresh-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--s3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.refresh-btn.loading .spin { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.countdown-row { display: flex; align-items: center; justify-content: flex-end; gap: 6px; font-family: var(--mono); font-size: 9px; color: var(--muted2); }
.countdown-bar-wrap { flex: 1; max-width: 100px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.countdown-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; }

/* ADD BAR */
.add-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--s1); }
.add-form { display: flex; gap: 8px; }
.add-input { flex: 1; background: var(--s3); border: 1px solid var(--border2); border-radius: 9px; padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.2s; text-transform: uppercase; }
.add-input::placeholder { color: var(--muted); text-transform: none; }
.add-input:focus { border-color: var(--accent); }
.add-btn { padding: 10px 18px; background: var(--accent); border: none; border-radius: 9px; color: #fff; font-family: var(--sans); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
.add-btn:hover { background: var(--accent2); }
.add-btn:disabled { background: var(--muted2); cursor: not-allowed; }
.add-hint { margin-top: 7px; font-size: 11px; color: var(--muted); }
.add-hint span { color: var(--accent2); }

/* TOAST */
.toast { position: fixed; top: 16px; right: 16px; background: var(--s3); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; font-size: 12px; z-index: 999; max-width: 260px; transform: translateX(120%); transition: transform 0.3s ease; }
.toast.show { transform: translateX(0); }
.toast.success { border-color: var(--long); }
.toast.error { border-color: var(--short); }
.toast.info { border-color: var(--accent); }

/* MAIN */
.main { padding: 14px 16px; }
.section-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }

/* ASSET CARD */
.asset-card { background: var(--s1); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.asset-card.expanded { border-color: var(--border2); }
.card-summary { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; user-select: none; gap: 10px; transition: background 0.15s; }
.card-summary:active { background: var(--s2); }
.asset-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.summary-info { flex: 1; min-width: 0; }
.asset-ticker { font-family: var(--mono); font-size: 13px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.source-badge { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 4px; letter-spacing: 0.5px; }
.source-badge.binance { background: rgba(240,185,11,0.15); color: #f0b90b; }
.source-badge.coingecko { background: rgba(91,110,245,0.15); color: var(--accent2); }
.ind-badges { display: flex; align-items: center; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.ind-badge { font-family: var(--mono); font-size: 8px; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.3px; font-weight: 700; }
.ind-badge.bull { background: rgba(0,229,160,0.12); color: var(--long); border: 1px solid rgba(0,229,160,0.2); }
.ind-badge.bear { background: rgba(255,68,102,0.12); color: var(--short); border: 1px solid rgba(255,68,102,0.2); }
.ind-badge.neut { background: rgba(245,166,35,0.12); color: var(--neutral); border: 1px solid rgba(245,166,35,0.2); }
.ind-badge.load { background: var(--s3); color: var(--muted); border: 1px solid var(--border2); }
.summary-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.asset-price { font-family: var(--mono); font-size: 15px; font-weight: 700; line-height: 1; }
.asset-change { font-family: var(--mono); font-size: 11px; font-weight: 500; }
.asset-change.pos { color: var(--long); }
.asset-change.neg { color: var(--short); }
.signal-pill { display: flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 6px; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
.signal-pill.LONG   { background: var(--long-dim);    color: var(--long);    border: 1px solid rgba(0,229,160,0.2); }
.signal-pill.SHORT  { background: var(--short-dim);   color: var(--short);   border: 1px solid rgba(255,68,102,0.2); }
.signal-pill.NEUTRAL{ background: var(--neutral-dim); color: var(--neutral); border: 1px solid rgba(245,166,35,0.2); }
.chevron { font-size: 11px; color: var(--muted); flex-shrink: 0; transition: transform 0.25s ease; }
.asset-card.expanded .chevron { transform: rotate(180deg); }

/* CARD DETAIL */
.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); border-top: 0px solid var(--border); }
.asset-card.expanded .card-detail { max-height: 1200px; border-top: 1px solid var(--border); }

/* SIGNAL BLOCK */
.signal-block { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.signal-badge { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 9px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
.signal-badge.LONG   { background: var(--long-dim);    color: var(--long);    border: 1px solid rgba(0,229,160,0.25); }
.signal-badge.SHORT  { background: var(--short-dim);   color: var(--short);   border: 1px solid rgba(255,68,102,0.25); }
.signal-badge.NEUTRAL{ background: var(--neutral-dim); color: var(--neutral); border: 1px solid rgba(245,166,35,0.25); }
.signal-reason { font-size: 11px; color: var(--muted); line-height: 1.4; flex: 1; }
.signal-strength { display: flex; gap: 3px; flex-shrink: 0; }
.strength-pip { width: 6px; height: 6px; border-radius: 2px; background: var(--border2); }
.strength-pip.active.LONG    { background: var(--long); }
.strength-pip.active.SHORT   { background: var(--short); }
.strength-pip.active.NEUTRAL { background: var(--neutral); }

/* CONFIDENCE METER */
.confidence-block { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.confidence-header { display: flex; align-items: center; justify-content: space-between; }
.confidence-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.confidence-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.confidence-val.LONG  { color: var(--long); }
.confidence-val.SHORT { color: var(--short); }
.confidence-val.NEUTRAL { color: var(--neutral); }
.confidence-sub { font-size: 10px; color: var(--muted); }
.confidence-track { height: 8px; background: var(--border2); border-radius: 6px; overflow: hidden; }
.confidence-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.confidence-fill.LONG    { background: linear-gradient(90deg, rgba(0,229,160,0.4), var(--long)); }
.confidence-fill.SHORT   { background: linear-gradient(90deg, rgba(255,68,102,0.4), var(--short)); }
.confidence-fill.NEUTRAL { background: linear-gradient(90deg, rgba(245,166,35,0.4), var(--neutral)); }
.confidence-factors { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.cf-factor { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 4px; }
.cf-factor.ok   { background: rgba(0,229,160,0.1); color: var(--long); border: 1px solid rgba(0,229,160,0.15); }
.cf-factor.fail { background: rgba(255,68,102,0.1); color: var(--short); border: 1px solid rgba(255,68,102,0.15); }
.cf-factor.skip { background: var(--s3); color: var(--muted2); border: 1px solid var(--border); }

/* MULTI-TIMEFRAME */
.mtf-block { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.mtf-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.mtf-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.mtf-box { background: var(--s2); border: 1px solid var(--border); border-radius: 9px; padding: 8px; text-align: center; }
.mtf-tf { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 4px; }
.mtf-sig { font-family: var(--mono); font-size: 11px; font-weight: 700; }
.mtf-sig.LONG    { color: var(--long); }
.mtf-sig.SHORT   { color: var(--short); }
.mtf-sig.NEUTRAL { color: var(--neutral); }
.mtf-sig.loading { color: var(--muted2); }
.mtf-rsi { font-size: 9px; color: var(--muted); margin-top: 2px; }

/* INDICATORS PANEL */
.indicators-panel { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.ind-panel-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.ind-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.ind-box { background: var(--s2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 8px; text-align: center; }
.ind-box-label { font-family: var(--mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.ind-box-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.ind-box-val.bull { color: var(--long); }
.ind-box-val.bear { color: var(--short); }
.ind-box-val.neut { color: var(--neutral); }
.ind-box-sub { font-size: 9px; color: var(--muted); margin-top: 3px; }

/* VOLUME BLOCK */
.vol-block { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
.vol-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.vol-bars { flex: 1; display: flex; align-items: flex-end; gap: 2px; height: 28px; }
.vol-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; }
.vol-bar.up   { background: rgba(0,229,160,0.5); }
.vol-bar.down { background: rgba(255,68,102,0.5); }
.vol-bar.cur  { opacity: 1 !important; }
.vol-info { font-family: var(--mono); font-size: 10px; text-align: right; flex-shrink: 0; }
.vol-ratio { font-weight: 700; }
.vol-ratio.bull { color: var(--long); }
.vol-ratio.bear { color: var(--short); }
.vol-ratio.neut { color: var(--neutral); }

/* TP/SL */
.tpsl-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.tpsl-box { background: var(--s2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 8px; text-align: center; }
.tpsl-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; margin-bottom: 4px; }
.tpsl-label.sl  { color: var(--short); }
.tpsl-label.tp1 { color: var(--long); }
.tpsl-label.tp2 { color: var(--accent2); }
.tpsl-value { font-family: var(--mono); font-size: 11px; font-weight: 700; }
.tpsl-pct   { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* LEVELS */
.levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.level-group-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.level-group-label.support    { color: var(--long); }
.level-group-label.resistance { color: var(--short); }
.level-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 9px; background: var(--s2); border-radius: 7px; margin-bottom: 4px; border: 1px solid var(--border); }
.level-label { font-size: 10px; color: var(--muted); }
.level-price { font-family: var(--mono); font-size: 11px; font-weight: 700; }
.level-price.support    { color: var(--long); }
.level-price.resistance { color: var(--short); }

/* SIGNAL TIMESTAMP */
.signal-timestamp { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--s2); border-top: 1px solid var(--border); margin: 0 14px 12px; border-radius: 10px; }
.ts-icon { font-size: 15px; flex-shrink: 0; }
.ts-info { flex: 1; }
.ts-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.ts-datetime { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 1px; }
.ts-elapsed { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.ts-elapsed span { color: var(--accent2); font-weight: 700; }

.detail-footer { padding: 8px 14px 12px; display: flex; justify-content: flex-end; }
.remove-btn { background: none; border: 1px solid var(--border2); border-radius: 7px; color: var(--muted); font-size: 11px; padding: 5px 12px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.remove-btn:hover { background: var(--short-dim); border-color: var(--short); color: var(--short); }

/* SKELETON */
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
.loading-text { background: linear-gradient(90deg, var(--s3) 25%, var(--border2) 50%, var(--s3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; color: transparent; user-select: none; }

/* EMPTY */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-icon  { font-size: 40px; margin-bottom: 14px; }
.empty-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty-sub   { font-size: 12px; line-height: 1.6; }
.last-update { font-family: var(--mono); font-size: 10px; color: var(--muted2); text-align: center; padding: 12px; }

/* NOTIF */
.notif-btn { display: flex; align-items: center; gap: 5px; padding: 6px 11px; background: var(--s3); border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.notif-btn:hover { border-color: var(--accent); color: var(--accent2); }
.notif-btn.granted { border-color: rgba(0,229,160,0.4); color: var(--long); background: rgba(0,229,160,0.07); }
.notif-btn.denied  { border-color: rgba(255,68,102,0.4); color: var(--short); background: rgba(255,68,102,0.07); cursor: not-allowed; }
.notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); flex-shrink: 0; transition: background 0.2s; }
.notif-btn.granted .notif-dot { background: var(--long); animation: pulse 2s infinite; }
.notif-btn.denied  .notif-dot { background: var(--short); }

/* WARN badge when MTF conflict */
.signal-warn { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 4px; background: rgba(245,166,35,0.12); color: var(--neutral); border: 1px solid rgba(245,166,35,0.2); margin-left: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">SIGNAL<span>BOARD</span></div>
    </div>
    <div class="header-right">
      <div class="status-bar"><div class="pulse"></div><span>EN VIVO</span></div>
      <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">
        <div class="notif-dot" id="notifDot"></div>
        <span id="notifLabel">ALERTAS</span>
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
        <span class="spin">↻</span> REFRESH
      </button>
    </div>
  </div>
  <div class="countdown-row">
    <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdownBar" style="width:100%"></div></div>
    <span id="countdownDisplay" style="font-size:9px;color:var(--muted2)">60s</span>
    <span id="lastUpdate" style="font-size:9px;color:var(--muted2)"></span>
  </div>
</div>

<div class="add-bar">
  <div class="add-form">
    <input class="add-input" id="addInput" type="text" placeholder="Ticker: BTC, ETH, SOL…" maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="add-btn" id="addBtn" onclick="handleAdd()">+ Añadir</button>
  </div>
  <div class="add-hint">Motor: <span>RSI · EMA · MACD · Bollinger · Volumen · Multi-timeframe · S/R reales</span></div>
</div>

<div class="main">
  <div class="section-eyebrow">Activos monitorizados</div>
  <div id="cardsContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let assets        = JSON.parse(localStorage.getItem('sb_assets')||'[]');
let priceData     = {};
let indicatorData = {}; // 1H indicators
let mtfData       = {}; // {ticker: {h4: {...}, d1: {...}}}
let signalHistory = JSON.parse(localStorage.getItem('sb_signals')||'{}');
let expanded      = {};
let notifsEnabled = localStorage.getItem('sb_notifs')==='true';
let countdown=60, cdTimer, elapsedTimer, isRefreshing=false;

const COINGECKO_MAP={HYPE:'hyperliquid',ZEC:'zcash',TAO:'bittensor',SUI:'sui',APT:'aptos',INJ:'injective-protocol',TIA:'celestia',OP:'optimism',ARB:'arbitrum',NEAR:'near',ATOM:'cosmos',UNI:'uniswap',LINK:'chainlink',DOT:'polkadot',AVAX:'avalanche-2',DOGE:'dogecoin',ADA:'cardano',XRP:'ripple',BNB:'binancecoin',SOL:'solana',ETH:'ethereum',BTC:'bitcoin',MATIC:'matic-network'};

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function updateNotifUI(){
  const btn=document.getElementById('notifBtn'),label=document.getElementById('notifLabel');
  btn.className='notif-btn';
  const perm=Notification.permission;
  if(perm==='denied'){btn.classList.add('denied');label.textContent='BLOQUEADO';notifsEnabled=false;}
  else if(perm==='granted'&&notifsEnabled){btn.classList.add('granted');label.textContent='🔔 ON';}
  else{label.textContent='ALERTAS';}
}
async function toggleNotifications(){
  if(Notification.permission==='denied'){showToast('Notificaciones bloqueadas.','error');return;}
  if(!notifsEnabled){
    const perm=await Notification.requestPermission();
    if(perm==='granted'){notifsEnabled=true;localStorage.setItem('sb_notifs','true');updateNotifUI();showToast('✅ Notificaciones activadas','success');sendNotification('🔔 SignalBoard','Alertas activas.','📡');}
    else{showToast('Permiso denegado.','error');updateNotifUI();}
  } else {notifsEnabled=false;localStorage.setItem('sb_notifs','false');updateNotifUI();showToast('🔕 Off','info');}
}
function sendNotification(title,body,icon='📡'){
  if(!notifsEnabled||Notification.permission!=='granted') return;
  try{const n=new Notification(title,{body,icon:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${icon}</text></svg>`,tag:title,renotify:true});n.onclick=()=>{window.focus();n.close();};}catch(e){}
}

function saveSignalHistory(){localStorage.setItem('sb_signals',JSON.stringify(signalHistory));}
function recordSignal(ticker,signal){
  const prev=signalHistory[ticker];
  const isNew=!prev||prev.signal!==signal;
  if(isNew){
    const isFirstEver=!prev;
    signalHistory[ticker]={signal,ts:Date.now()};saveSignalHistory();
    if(!isFirstEver){
      const arrow=signal==='LONG'?'↑':signal==='SHORT'?'↓':'→';
      const icon=signal==='LONG'?'📈':signal==='SHORT'?'📉':'➡️';
      const price=priceData[ticker]?.price;
      sendNotification(`${icon} ${ticker} → ${arrow} ${signal}`,`${price?fmt(price)+' USDT · ':''}${new Date().toLocaleTimeString('es-ES')}`,icon);
    }
  }
}

function fmtDatetime(ts){const d=new Date(ts);const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];return`${days[d.getDay()]} ${d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'})} · ${d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;}

async function fetchCandles(ticker, interval='1h', limit=120){
  const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${ticker}USDT&interval=${interval}&limit=${limit}`);
  if(!r.ok) throw new Error('klines');

}

// ── INDICATORS ────────────────────────────────────────────────────────────────
function calcEMA(closes, period){
  if(closes.length<period) return null;
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++) ema=closes[i]*k+ema*(1-k);
  return ema;
}

function calcEMAArr(closes, period){
  if(closes.length<period) return [];
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  const arr=[...Array(period-1).fill(null),ema];
  for(let i=period;i<closes.length;i++){ema=closes[i]*k+ema*(1-k);arr.push(ema);}
  return arr;
}

function calcRSI(closes, period=14){
  if(closes.length<period+1) return null;
  let gains=0,losses=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];if(d>=0)gains+=d;else losses+=Math.abs(d);}
  let avgGain=gains/period,avgLoss=losses/period;
  for(let i=period+1;i<closes.length;i++){const d=closes[i]-closes[i-1];const g=d>=0?d:0,l=d<0?Math.abs(d):0;avgGain=(avgGain*(period-1)+g)/period;avgLoss=(avgLoss*(period-1)+l)/period;}
  if(avgLoss===0) return 100;
  return +(100-(100/(1+avgGain/avgLoss))).toFixed(1);
}

function calcMACD(closes){
  const ema12=calcEMAArr(closes,12);
  const ema26=calcEMAArr(closes,26);
  if(!ema12.length||!ema26.length) return null;
  const macdLine=ema12.map((v,i)=>v!=null&&ema26[i]!=null?v-ema26[i]:null).filter(v=>v!=null);
  if(macdLine.length<9) return null;
  const signal=calcEMAArr(macdLine,9);
  const lastMACD=macdLine[macdLine.length-1];
  const lastSignal=signal[signal.length-1];
  const histogram=lastMACD-lastSignal;
  const prevHist=macdLine[macdLine.length-2]-(signal[signal.length-2]||0);
  return {macd:+lastMACD.toFixed(6),signal:+lastSignal.toFixed(6),histogram:+histogram.toFixed(6),rising:histogram>prevHist};
}

function calcBollinger(closes, period=20, mult=2){
  if(closes.length<period) return null;
  const slice=closes.slice(-period);
  const mean=slice.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/period);
  const upper=mean+mult*std,lower=mean-mult*std;
  const price=closes[closes.length-1];
  const pct=+(((price-lower)/(upper-lower))*100).toFixed(1);
  const bw=+((upper-lower)/mean*100).toFixed(2);
  return {upper:+upper.toFixed(6),middle:+mean.toFixed(6),lower:+lower.toFixed(6),pct,bw};
}

function calcATR(candles, period=14){
  if(candles.length<period+1) return null;
  const trs=candles.slice(1).map((c,i)=>Math.max(c.high-c.low,Math.abs(c.high-candles[i].close),Math.abs(c.low-candles[i].close)));
  return trs.slice(-period).reduce((a,b)=>a+b,0)/period;
}

function calcVolumeProfile(candles){
  const recent=candles.slice(-20);
  const avgVol=recent.slice(0,-1).reduce((a,c)=>a+c.vol,0)/(recent.length-1);
  const lastVol=recent[recent.length-1].vol;
  const ratio=+(lastVol/avgVol).toFixed(2);
  const bars=recent.slice(-12).map(c=>({vol:c.vol,up:c.close>=c.open}));
  return{ratio,bars,high:ratio>1.5,bars12:bars};
}

function findSRLevels(candles, price){
  const tolerance=price*0.015;
  function cluster(arr){
    const sorted=[...arr].sort((a,b)=>a-b);
    const clusters=[];let group=[sorted[0]];
    for(let i=1;i<sorted.length;i++){if(sorted[i]-group[group.length-1]<=tolerance)group.push(sorted[i]);else{clusters.push(group);group=[sorted[i]];}}
    clusters.push(group);
    return clusters.filter(g=>g.length>=2).map(g=>g.reduce((a,b)=>a+b,0)/g.length).sort((a,b)=>a-b);
  }
  const levels=cluster([...candles.map(c=>c.high),...candles.map(c=>c.low)]);
  let supports=levels.filter(l=>l<price).slice(-4);
  let resistances=levels.filter(l=>l>price).slice(0,4);
  const p=price;
  while(supports.length<4) supports.unshift(+(p*(0.97-0.04*(4-supports.length))).toFixed(6));
  while(resistances.length<4) resistances.push(+(p*(1.04+0.06*(resistances.length))).toFixed(6));
  return{supports:supports.slice(-4),resistances:resistances.slice(0,4)};
}

async function fetchIndicators(ticker, interval='1h', limit=120){
  try{
    const candles=await fetchCandles(ticker,interval,limit);
    const closes=candles.map(c=>c.close);
    const price=closes[closes.length-1];
    return{
      rsi:calcRSI(closes,14),
      ema20:calcEMA(closes,20),
      ema50:calcEMA(closes,50),
      ema200:calcEMA(closes,200),
      macd:calcMACD(closes),
      bb:calcBollinger(closes,20,2),
      atr:calcATR(candles,14),
      vol:calcVolumeProfile(candles),
      sr:findSRLevels(candles,price),
      ok:true,
      price,
    };
  }catch(e){return{ok:false};}
}

// ── SIGNAL ENGINE ─────────────────────────────────────────────────────────────
// Returns a signal object from a set of indicators + price + change24h
function computeSignalFromInd(price, change24h, ind, predefinedSR){
  let score=0;
  const factors=[];

  const {supports,resistances}= (ind.ok && ind.sr) ? ind.sr
    : predefinedSR
    ? {supports:predefinedSR.supports, resistances:predefinedSR.resistances}
    : {supports:[price*0.97,price*0.93,price*0.87,price*0.80], resistances:[price*1.04,price*1.10,price*1.18,price*1.28]};

  const nearSup=supports.reduce((a,b)=>Math.abs(b-price)<Math.abs(a-price)?b:a);
  const nearRes=resistances.reduce((a,b)=>Math.abs(b-price)<Math.abs(a-price)?b:a);
  const dSup=((price-nearSup)/price)*100, dRes=((nearRes-price)/price)*100;
  if(dSup<dRes){score+=2;factors.push({label:'S/R',ok:true,note:`Soporte ${fmt(nearSup)}`});}
  else{score-=1;factors.push({label:'S/R',ok:false,note:`Resist. ${fmt(nearRes)}`});}

  // 24h momentum
  if(change24h>8){score+=2;factors.push({label:'Mom24h',ok:true,note:`+${change24h.toFixed(1)}%`});}
  else if(change24h>3){score+=1;factors.push({label:'Mom24h',ok:true,note:`+${change24h.toFixed(1)}%`});}
  else if(change24h<-8){score-=2;factors.push({label:'Mom24h',ok:false,note:`${change24h.toFixed(1)}%`});}
  else if(change24h<-3){score-=1;factors.push({label:'Mom24h',ok:false,note:`${change24h.toFixed(1)}%`});}
  else{factors.push({label:'Mom24h',ok:null,note:`${change24h.toFixed(1)}%`});}

  // RSI
  if(ind.rsi!=null){
    if(ind.rsi<30){score+=2;factors.push({label:'RSI',ok:true,note:`${ind.rsi} sobrevend.`});}
    else if(ind.rsi<45){score+=1;factors.push({label:'RSI',ok:true,note:`${ind.rsi} bajo`});}
    else if(ind.rsi>70){score-=2;factors.push({label:'RSI',ok:false,note:`${ind.rsi} sobrecomp.`});}
    else if(ind.rsi>58){score-=1;factors.push({label:'RSI',ok:false,note:`${ind.rsi} alto`});}
    else{factors.push({label:'RSI',ok:null,note:`${ind.rsi} neutro`});}
  } else {factors.push({label:'RSI',ok:null,note:'—'});}

  // EMA cross
  if(ind.ema20!=null&&ind.ema50!=null){
    if(ind.ema20>ind.ema50&&price>ind.ema20){score+=2;factors.push({label:'EMA',ok:true,note:'P>EMA20>50'});}
    else if(ind.ema20>ind.ema50){score+=1;factors.push({label:'EMA',ok:true,note:'EMA20>50'});}
    else if(ind.ema20<ind.ema50&&price<ind.ema20){score-=2;factors.push({label:'EMA',ok:false,note:'P<EMA20<50'});}
    else{score-=1;factors.push({label:'EMA',ok:false,note:'EMA20<50'});}
  } else {factors.push({label:'EMA',ok:null,note:'—'});}

  // MACD
  if(ind.macd){
    const m=ind.macd;
    if(m.histogram>0&&m.rising){score+=2;factors.push({label:'MACD',ok:true,note:'↑ Alcista'});}
    else if(m.histogram>0){score+=1;factors.push({label:'MACD',ok:true,note:'Hist >0'});}
    else if(m.histogram<0&&!m.rising){score-=2;factors.push({label:'MACD',ok:false,note:'↓ Bajista'});}
    else{score-=1;factors.push({label:'MACD',ok:false,note:'Hist <0'});}
  } else {factors.push({label:'MACD',ok:null,note:'—'});}

  // Bollinger
  if(ind.bb){
    const b=ind.bb;
    if(b.pct<10){score+=2;factors.push({label:'BB',ok:true,note:`BB ${b.pct}% bajo`});}
    else if(b.pct<30){score+=1;factors.push({label:'BB',ok:true,note:`BB ${b.pct}%`});}
    else if(b.pct>90){score-=2;factors.push({label:'BB',ok:false,note:`BB ${b.pct}% alto`});}
    else if(b.pct>70){score-=1;factors.push({label:'BB',ok:false,note:`BB ${b.pct}%`});}
    else{factors.push({label:'BB',ok:null,note:`BB ${b.pct}%`});}
  } else {factors.push({label:'BB',ok:null,note:'—'});}

  // Volume confirmation
  if(ind.vol){
    const v=ind.vol;
    if(v.high&&v.ratio>1.5){score+=1;factors.push({label:'Vol',ok:true,note:`${v.ratio}x alto`});}
    else if(v.ratio<0.6){score-=1;factors.push({label:'Vol',ok:false,note:`${v.ratio}x bajo`});}
    else{factors.push({label:'Vol',ok:null,note:`${v.ratio}x`});}
  } else {factors.push({label:'Vol',ok:null,note:'—'});}

  // Range position
  const rangeMin=supports[supports.length-1],rangeMax=resistances[resistances.length-1];
  const pos=(price-rangeMin)/(rangeMax-rangeMin);
  if(pos<0.25){score+=1;factors.push({label:'Rango',ok:true,note:'Zona baja'});}
  else if(pos>0.78){score-=1;factors.push({label:'Rango',ok:false,note:'Zona alta'});}
  else{factors.push({label:'Rango',ok:null,note:'Medio'});}

  // Decision — tighter thresholds mean fewer but higher-quality signals
  let signal,strength;
  if(score>=5){signal='LONG';strength=Math.min(score,5);}
  else if(score<=-4){signal='SHORT';strength=Math.min(Math.abs(score),5);}
  else{signal='NEUTRAL';strength=Math.max(1,3-Math.abs(score));}

  const okFactors=factors.filter(f=>f.ok===true).length;
  const totalFactors=factors.filter(f=>f.ok!==null).length||1;
  const confluence=signal==='LONG'?Math.round(okFactors/totalFactors*100)
    :signal==='SHORT'?Math.round((totalFactors-okFactors)/totalFactors*100):50;

  // ATR-based SL
  const sl_pct=0.07;
  const atrSl=ind.atr?ind.atr*2:null;
  const sl=signal==='LONG'?+(price-(atrSl||price*sl_pct)).toFixed(6):+(price+(atrSl||price*sl_pct)).toFixed(6);
  const tp1=signal==='LONG'?+resistances[0].toFixed(6):+supports[supports.length-1].toFixed(6);
  const tp2=signal==='LONG'?+resistances[1].toFixed(6):+supports[supports.length-2].toFixed(6);
  const pct=(a,b)=>+((Math.abs(a-b)/b)*100).toFixed(1);

  return{signal,strength,score,confluence,factors,
    reason:factors.filter(f=>f.ok!==null).slice(0,3).map(f=>f.note).join(' · '),
    sl,slpct:pct(sl,price),tp1,tp1pct:pct(tp1,price),tp2,tp2pct:pct(tp2,price),
    sups:supports,ress:resistances,
    rsi:ind.rsi,ema20:ind.ema20,ema50:ind.ema50,macd:ind.macd,bb:ind.bb,vol:ind.vol,
  };
}

  if(isNew){card=document.createElement('div');card.className='asset-card';card.id=`card-${ticker}`;container.appendChild(card);}
  const color=colorForTicker(ticker),icon=emojiForTicker(ticker);

    card.innerHTML=`<div class="card-summary" onclick="toggleExpand('${ticker}')">
      <div class="asset-icon" style="background:${color}22;color:${color}">${icon}</div>
      <div class="summary-info"><div class="asset-ticker" style="color:${color}">${ticker}/USDT</div>
      <div class="ind-badges"><span class="ind-badge load">analizando…</span></div></div>
      <div class="summary-right"><div class="asset-price loading-text" style="min-width:70px">000.00</div><div class="asset-change loading-text" style="min-width:50px">+0.00%</div></div>
      <div class="chevron">▾</div></div>`;
    return;
  }

  const {price,change24h,source}=data;

  const mtfInfo=mtf||mtfData[ticker]||{};

  const arrow=sig.signal==='LONG'?'↑':sig.signal==='SHORT'?'↓':'→';
  const isExp=expanded[ticker];
  const sigTs=getSignalTs(ticker,sig.signal);
  const tsIcon=sig.signal==='LONG'?'📈':sig.signal==='SHORT'?'📉':'➡️';

  // MTF agreement check
  const mtfSigs=[mtfInfo.h4?.signal,mtfInfo.d1?.signal].filter(Boolean);
  const mtfConflict=mtfSigs.length>0&&mtfSigs.some(s=>s!==sig.signal&&s!=='NEUTRAL'&&sig.signal!=='NEUTRAL');
  const mtfAgree=mtfSigs.length>0&&mtfSigs.every(s=>s===sig.signal||s==='NEUTRAL');

  // Quick badges for summary
  function rsiBadge(){if(sig.rsi==null)return'<span class="ind-badge load">RSI —</span>';const cl=sig.rsi<35?'bull':sig.rsi>65?'bear':'neut';return`<span class="ind-badge ${cl}">RSI ${sig.rsi}</span>`;}
  function macdBadge(){if(!sig.macd)return'';const cl=sig.macd.histogram>0&&sig.macd.rising?'bull':sig.macd.histogram<0&&!sig.macd.rising?'bear':'neut';return`<span class="ind-badge ${cl}">MACD ${cl==='bull'?'↑':cl==='bear'?'↓':'→'}</span>`;}
  function bbBadge(){if(!sig.bb)return'';const cl=sig.bb.pct<25?'bull':sig.bb.pct>75?'bear':'neut';return`<span class="ind-badge ${cl}">BB ${sig.bb.pct}%</span>`;}
  function mtfBadge(){if(!mtfSigs.length)return'<span class="ind-badge load">MTF —</span>';if(mtfConflict)return'<span class="ind-badge neut">MTF ⚠</span>';if(mtfAgree)return'<span class="ind-badge bull">MTF ✓</span>';return'<span class="ind-badge load">MTF ~</span>';}

  // Volume bars HTML
  function volBars(){
    if(!sig.vol) return '<span style="color:var(--muted);font-size:10px">—</span>';
    const maxV=Math.max(...sig.vol.bars12.map(b=>b.vol));
    const bars=sig.vol.bars12.map((b,i)=>{const h=Math.max(4,Math.round(b.vol/maxV*26));const isCur=i===sig.vol.bars12.length-1;return`<div class="vol-bar ${b.up?'up':'down'}${isCur?' cur':''}" style="height:${h}px;opacity:${0.4+0.6*(h/26)}"></div>`;}).join('');
    const rCl=sig.vol.ratio>1.5?'bull':sig.vol.ratio<0.6?'bear':'neut';
    return`<div class="vol-bars">${bars}</div><div class="vol-info"><span class="vol-ratio ${rCl}">${sig.vol.ratio}x</span><br><span style="font-size:9px;color:var(--muted)">vs avg</span></div>`;
  }

  // MTF signal boxes
  function mtfBoxes(){

    return tfs.map(({key,label,sig:s,d})=>{

      const a=sig2.signal==='LONG'?'↑':sig2.signal==='SHORT'?'↓':'→';
      return`<div class="mtf-box"><div class="mtf-tf">${label}</div><div class="mtf-sig ${sig2.signal}">${a} ${sig2.signal}</div><div class="mtf-rsi">${sig2.rsi!=null?`RSI ${sig2.rsi}`:''}</div></div>`;
    }).join('');
  }

  // Confidence factors
  function factorPills(){
    return sig.factors.map(f=>{
      const cl=f.ok===true?'ok':f.ok===false?'fail':'skip';
      return`<span class="cf-factor ${cl}">${f.label}: ${f.note}</span>`;
    }).join('');
  }

  const warnHtml=mtfConflict?`<span class="signal-warn">⚠ MTF conflicto</span>`:'';

  card.innerHTML=`
    <div class="card-summary" onclick="toggleExpand('${ticker}')">
      <div class="asset-icon" style="background:${color}22;color:${color}">${icon}</div>

        <div class="asset-ticker" style="color:${color}">${ticker}/USDT ${warnHtml}</div>
        <div class="ind-badges">
          <span class="source-badge ${source}">${source==='binance'?'BINANCE':'COINGECKO'}</span>
          ${rsiBadge()}${macdBadge()}${bbBadge()}${mtfBadge()}
        </div>
      </div>
      <div class="summary-right">
        <div class="asset-price">${fmt(price)}</div>
        <div class="asset-change ${change24h>=0?'pos':'neg'}">${change24h>=0?'+':''}${change24h.toFixed(2)}%</div>
        <div class="signal-pill ${sig.signal}">${arrow} ${sig.signal}</div>
      </div>
      <div class="chevron">▾</div>
    </div>

    <div class="card-detail">

      <!-- SIGNAL + STRENGTH -->
      <div class="signal-block">
        <div class="signal-badge ${sig.signal}">${arrow} ${sig.signal}</div>
        <div class="signal-reason">${sig.reason}</div>
        <div class="signal-strength">${[1,2,3,4,5].map(i=>`<div class="strength-pip ${i<=sig.strength?'active '+sig.signal:''}"></div>`).join('')}</div>
      </div>

      <!-- CONFIDENCE -->
      <div class="confidence-block">
        <div class="confidence-header">
          <div>
            <div class="confidence-label">Confianza de la señal</div>
            <div class="confidence-sub">${sig.factors.filter(f=>f.ok===true).length} de ${sig.factors.filter(f=>f.ok!==null).length} factores alineados · Score ${sig.score>0?'+':''}${sig.score}</div>
          </div>
          <div class="confidence-val ${sig.signal}">${sig.confluence}%</div>
        </div>
        <div class="confidence-track"><div class="confidence-fill ${sig.signal}" style="width:${sig.confluence}%"></div></div>
        <div class="confidence-factors">${factorPills()}</div>
      </div>

      <!-- MULTI-TIMEFRAME -->
      <div class="mtf-block">
        <div class="mtf-title">Confirmación multi-timeframe ${mtfConflict?'⚠ Señales opuestas — esperar':mtfAgree?'✓ Alineado':''}</div>
        <div class="mtf-row">${mtfBoxes()}</div>
      </div>

      <!-- INDICATORS -->
      <div class="indicators-panel">
        <div class="ind-panel-title">Indicadores técnicos · 1H</div>
        <div class="ind-row">
          <div class="ind-box">
            <div class="ind-box-label">RSI 14</div>
            <div class="ind-box-val ${sig.rsi==null?'neut':sig.rsi<35?'bull':sig.rsi>65?'bear':'neut'}">${sig.rsi!=null?sig.rsi:'—'}</div>
            <div class="ind-box-sub">${sig.rsi==null?'sin datos':sig.rsi<30?'Sobrevendido':sig.rsi>70?'Sobrecomprado':sig.rsi<45?'Bajo':'Neutral'}</div>
          </div>
          <div class="ind-box">
            <div class="ind-box-label">MACD Hist</div>
            <div class="ind-box-val ${!sig.macd?'neut':sig.macd.histogram>0&&sig.macd.rising?'bull':sig.macd.histogram<0&&!sig.macd.rising?'bear':'neut'}">${sig.macd?fmt(sig.macd.histogram):'—'}</div>
            <div class="ind-box-sub">${sig.macd?(sig.macd.histogram>0&&sig.macd.rising?'↑ Alcista':sig.macd.histogram<0&&!sig.macd.rising?'↓ Bajista':'Plano'):'sin datos'}</div>
          </div>
          <div class="ind-box">
            <div class="ind-box-label">BB %</div>
            <div class="ind-box-val ${!sig.bb?'neut':sig.bb.pct<25?'bull':sig.bb.pct>75?'bear':'neut'}">${sig.bb!=null?sig.bb.pct+'%':'—'}</div>
            <div class="ind-box-sub">${sig.bb?(sig.bb.pct<10?'Banda baja':sig.bb.pct>90?'Banda alta':'Centro'):'sin datos'}</div>
          </div>
        </div>
        <div class="ind-row" style="margin-top:4px">
          <div class="ind-box">
            <div class="ind-box-label">EMA 20</div>
            <div class="ind-box-val ${sig.ema20==null?'neut':price>sig.ema20?'bull':'bear'}">${fmt(sig.ema20)}</div>
            <div class="ind-box-sub">${sig.ema20!=null?(price>sig.ema20?'P encima':'P debajo'):'sin datos'}</div>
          </div>
          <div class="ind-box">
            <div class="ind-box-label">EMA 50</div>
            <div class="ind-box-val ${sig.ema50==null?'neut':price>sig.ema50?'bull':'bear'}">${fmt(sig.ema50)}</div>
            <div class="ind-box-sub">${sig.ema50!=null?(price>sig.ema50?'P encima':'P debajo'):'sin datos'}</div>
          </div>
          <div class="ind-box">
            <div class="ind-box-label">EMA Cross</div>
            <div class="ind-box-val ${sig.ema20==null||sig.ema50==null?'neut':sig.ema20>sig.ema50?'bull':'bear'}">${sig.ema20!=null&&sig.ema50!=null?(sig.ema20>sig.ema50?'ALCISTA':'BAJISTA'):'—'}</div>
            <div class="ind-box-sub">EMA20 vs EMA50</div>
          </div>
        </div>
      </div>

      <!-- VOLUME -->
      <div class="vol-block">
        <div class="vol-label">Volumen</div>
        ${volBars()}
      </div>

      <!-- TP/SL -->
      <div class="tpsl-row">
        <div class="tpsl-box"><div class="tpsl-label sl">STOP LOSS</div><div class="tpsl-value">${fmt(sig.sl)}</div><div class="tpsl-pct">-${sig.slpct}%</div></div>
        <div class="tpsl-box"><div class="tpsl-label tp1">TP1</div><div class="tpsl-value">${fmt(sig.tp1)}</div><div class="tpsl-pct">+${sig.tp1pct}%</div></div>
        <div class="tpsl-box"><div class="tpsl-label tp2">TP2</div><div class="tpsl-value">${fmt(sig.tp2)}</div><div class="tpsl-pct">+${sig.tp2pct}%</div></div>
      </div>

      <!-- S/R LEVELS -->
      <div class="levels-grid">
        <div class="level-group">
          <div class="level-group-label support">Soportes</div>
          ${sig.sups.map((s,i)=>`<div class="level-item"><span class="level-label">S${i+1}</span><span class="level-price support">${fmt(s)}</span></div>`).join('')}
        </div>
        <div class="level-group">
          <div class="level-group-label resistance">Resistencias</div>
          ${sig.ress.map((r,i)=>`<div class="level-item"><span class="level-label">R${i+1}</span><span class="level-price resistance">${fmt(r)}</span></div>`).join('')}
        </div>
      </div>

      <!-- TIMESTAMP -->
      <div class="signal-timestamp">
        <div class="ts-icon">${tsIcon}</div>
        <div class="ts-info">
          <div class="ts-label">Señal formada</div>
          <div class="ts-datetime">${fmtDatetime(sigTs)}</div>
          <div class="ts-elapsed" id="elapsed-${ticker}">hace <span>${fmtElapsed(Date.now()-sigTs)}</span></div>
        </div>
      </div>

      <div class="detail-footer">
        <button class="remove-btn" onclick="event.stopPropagation();removeAsset('${ticker}')">✕ Quitar ${ticker}</button>
      </div>
    </div>`;

  if(isExp) card.classList.add('expanded');
  else card.classList.remove('expanded');
}

function renderEmpty(){document.getElementById('cardsContainer').innerHTML=`<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-title">Sin activos</div><div class="empty-sub">Añade un ticker arriba.<br>Ej: BTC, ETH, SOL, HYPE</div></div>`;}

// ── UPDATE ────────────────────────────────────────────────────────────────────
async function updateAll(){
  if(assets.length===0){renderEmpty();return;}
  // Prices
  const priceRes=await Promise.allSettled(assets.map(t=>fetchPrice(t)));
  assets.forEach((t,i)=>{if(priceRes[i].status==='fulfilled')priceData[t]=priceRes[i].value;});

  // 1H indicators
  const indRes=await Promise.allSettled(assets.map(t=>fetchIndicators(t,'1h',150)));
  assets.forEach((t,i)=>{if(indRes[i].status==='fulfilled')indicatorData[t]=indRes[i].value;});

  // 4H & 1D indicators (for MTF)
  const h4Res=await Promise.allSettled(assets.map(t=>fetchIndicators(t,'4h',100)));
  const d1Res=await Promise.allSettled(assets.map(t=>fetchIndicators(t,'1d',60)));
  assets.forEach((t,i)=>{
    const h4=h4Res[i].status==='fulfilled'?h4Res[i].value:{ok:false};
    const d1=d1Res[i].status==='fulfilled'?d1Res[i].value:{ok:false};
    const pd=priceData[t];
    const change24h=pd?.change24h||0;
    const price=pd?.price||0;
    mtfData[t]={
      h4:h4.ok&&price?computeSignalFromInd(price,change24h,h4,PREDEFINED_SR[t]):null,
      d1:d1.ok&&price?computeSignalFromInd(price,change24h,d1,PREDEFINED_SR[t]):null,
    };
  });

  assets.forEach(t=>renderCard(t,priceData[t]||null,indicatorData[t]||{},mtfData[t]||{}));
  document.getElementById('lastUpdate').textContent=`Actualizado: ${new Date().toLocaleTimeString('es-ES')}`;
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function startCountdown(){
  countdown=60;clearInterval(cdTimer);clearInterval(elapsedTimer);
  cdTimer=setInterval(()=>{
    countdown--;
    document.getElementById('countdownDisplay').textContent=`${countdown}s`;
    document.getElementById('countdownBar').style.width=(countdown/60*100)+'%';
    if(countdown<=0){clearInterval(cdTimer);updateAll().then(startCountdown);}
  },1000);
  elapsedTimer=setInterval(updateAllElapsed,1000);
}

async function manualRefresh(){
  if(isRefreshing)return;
  isRefreshing=true;const btn=document.getElementById('refreshBtn');btn.disabled=true;btn.classList.add('loading');
  clearInterval(cdTimer);clearInterval(elapsedTimer);
  await updateAll();
  isRefreshing=false;btn.disabled=false;btn.classList.remove('loading');
  startCountdown();showToast('Datos actualizados','success');
}

function saveAssets(){localStorage.setItem('sb_assets',JSON.stringify(assets));}

async function handleAdd(){
  const input=document.getElementById('addInput');
  const ticker=input.value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!ticker)return;
  if(assets.includes(ticker)){showToast(`${ticker} ya está en la lista`,'info');return;}
  if(assets.length>=12){showToast('Máximo 12 activos','error');return;}
  const btn=document.getElementById('addBtn');btn.disabled=true;btn.textContent='...';input.value='';
  assets.push(ticker);saveAssets();renderCard(ticker,null,{},{});
  try{
    const [data,ind,h4,d1]=await Promise.all([fetchPrice(ticker),fetchIndicators(ticker,'1h',150),fetchIndicators(ticker,'4h',100),fetchIndicators(ticker,'1d',60)]);
    priceData[ticker]=data;indicatorData[ticker]=ind;
    mtfData[ticker]={
      h4:h4.ok?computeSignalFromInd(data.price,data.change24h,h4,PREDEFINED_SR[ticker]):null,
      d1:d1.ok?computeSignalFromInd(data.price,data.change24h,d1,PREDEFINED_SR[ticker]):null,
    };
    renderCard(ticker,data,ind,mtfData[ticker]);
    showToast(`${ticker} añadido · ${ind.ok?'7 indicadores':'precio solo'}`,'success');
  }catch(e){
    showToast(`No se encontró ${ticker}`,'error');
    assets=assets.filter(t=>t!==ticker);saveAssets();
    document.getElementById(`card-${ticker}`)?.remove();
    if(assets.length===0)renderEmpty();
  }
  btn.disabled=false;btn.textContent='+ Añadir';
}

function removeAsset(ticker){
  expanded[ticker]=false;assets=assets.filter(t=>t!==ticker);
  delete priceData[ticker];delete indicatorData[ticker];delete mtfData[ticker];saveAssets();
  document.getElementById(`card-${ticker}`)?.remove();
  if(assets.length===0)renderEmpty();
  showToast(`${ticker} eliminado`,'info');
}

let toastTimer=null;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

document.getElementById('addInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleAdd();});

(async function init(){
  updateNotifUI();
  if(assets.length===0){renderEmpty();return;}
  assets.forEach(t=>renderCard(t,null,{},{}));
  await updateAll();
  startCountdown();
})();
</script>
</body>
</html>
